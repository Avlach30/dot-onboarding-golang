definitions:
  dto.BannerResponse:
    properties:
      description:
        type: string
      name:
        type: string
      source_url:
        type: string
    type: object
  dto.ExchangeRequest:
    properties:
      firebase_id_token:
        type: string
      phone_number:
        type: string
    required:
    - firebase_id_token
    - phone_number
    type: object
  dto.ExchangeResponse:
    properties:
      token:
        type: string
    type: object
  dto.ListProjectResponse:
    properties:
      astrodevs:
        items:
          $ref: '#/definitions/userdto.GetProfileResponse'
        type: array
      created_at:
        type: string
      description:
        type: string
      name:
        type: string
      service_type:
        type: string
      status:
        type: string
      uuid:
        type: string
    type: object
  pkg.BaseResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/pkg.MetaResponse'
    type: object
  pkg.MetaResponse:
    properties:
      limit:
        type: integer
      page:
        type: integer
    type: object
  userdto.GetProfileResponse:
    properties:
      fullname:
        type: string
      image_url:
        type: string
      role:
        type: string
    type: object
  userdto.RegisterRequest:
    properties:
      email:
        type: string
      fullname:
        type: string
      phone_number:
        type: string
      type:
        type: string
    required:
    - email
    - fullname
    - phone_number
    type: object
info:
  contact:
    email: mail@codespace.id
    name: Codespace Indonesia
    url: https://codespace.id
  description: Codespace X
  title: Codespace X REST API
  version: "1.0"
paths:
  /api/v1/auth/exchange-token:
    post:
      consumes:
      - application/json
      description: Exchange Token
      parameters:
      - description: X-Service-Auth-Token
        in: header
        name: X-Service-Auth-Token
        required: true
        type: string
      - description: payload exchange token
        in: body
        name: body-payload
        required: true
        schema:
          $ref: '#/definitions/dto.ExchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/pkg.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ExchangeResponse'
              type: object
        default:
          description: error
          schema:
            $ref: '#/definitions/pkg.BaseResponse'
      summary: Exchange Token
      tags:
      - Auth
  /api/v1/banners:
    get:
      consumes:
      - application/json
      description: List Banner
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/pkg.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.BannerResponse'
              type: object
        default:
          description: error
          schema:
            $ref: '#/definitions/pkg.BaseResponse'
      summary: List Banner
      tags:
      - Banner
  /api/v1/projects:
    get:
      consumes:
      - application/json
      description: List Project
      parameters:
      - description: Authorization value
        in: header
        name: authorization
        type: string
      - in: query
        name: limit
        type: integer
      - in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/pkg.BaseResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ListProjectResponse'
                  type: array
              type: object
        default:
          description: error
          schema:
            $ref: '#/definitions/pkg.BaseResponse'
      summary: List Project
      tags:
      - Projects
  /api/v1/projects/{project_uuid}:
    get:
      consumes:
      - application/json
      description: Detail Project
      parameters:
      - description: X-Service-Auth-Token
        in: header
        name: X-Service-Auth-Token
        required: true
        type: string
      - description: Authorization value
        in: header
        name: authorization
        type: string
      - description: project_uuid
        in: path
        name: project_uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/pkg.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.ListProjectResponse'
              type: object
        default:
          description: error
          schema:
            $ref: '#/definitions/pkg.BaseResponse'
      summary: Detail Project
      tags:
      - Projects
  /api/v1/users/register:
    post:
      consumes:
      - application/json
      description: Register
      parameters:
      - description: X-Service-Auth-Token
        in: header
        name: X-Service-Auth-Token
        required: true
        type: string
      - description: Authorization value
        in: header
        name: authorization
        type: string
      - description: userdto.RegisterRequest
        in: body
        name: body-payload
        required: true
        schema:
          $ref: '#/definitions/userdto.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/pkg.BaseResponse'
        default:
          description: error
          schema:
            $ref: '#/definitions/pkg.BaseResponse'
      summary: Register
      tags:
      - User
swagger: "2.0"
