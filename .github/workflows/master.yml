name: CICD Codespace X

on:
    push:
        branches:
            - master

jobs:
    build_push_deploy:
        name: Build -> Push -> Deploy
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set environment variables
              run: |
                  echo "IMAGE_NAME=codespaceid/repositories" >> $GITHUB_ENV
                  TAG=$([ $(echo $GITHUB_REF | cut -d'/' -f2) = "tags" ] && echo "production" || echo "${GITHUB_REF##*/}")
                  echo "IMAGE_TAG=codespace-x-$TAG" >> $GITHUB_ENV
                  echo "${{ secrets.ENVIRONMENT }}" | base64 -d > .env

            - name: Build Docker image MASTER
              if: github.ref == 'refs/heads/master'
              run: |
                  docker build \
                  -t $IMAGE_NAME:$IMAGE_TAG .

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Push tag
              run: |
                  docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

            - name: Deploy on Production
              if: github.ref == 'refs/heads/master'
              uses: appleboy/ssh-action@master
              env:
                  IMAGE_NAME: ${{ env.IMAGE_NAME }}
                  IMAGE_TAG: ${{ env.IMAGE_TAG }}
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USERNAME }}
                  key: ${{ secrets.SSH_KEY }}
                  script_stop: true
                  envs: IMAGE_NAME,IMAGE_TAG
                  script: |
                      echo "IMAGE: $IMAGE_NAME:$IMAGE_TAG"
                      export IMAGE_NAME=$IMAGE_NAME
                      export IMAGE_TAG=$IMAGE_TAG
                      mkdir -p app/master && cd app/master
                      if [ -d app-config ]; then cd app-config && git pull origin master; else git clone --branch=master git@github-com-app:codespace-id/app-config.git && cd app-config; fi

                      # running stack deploy
                      docker stack deploy --with-registry-auth -c docker-compose.yml -c docker-compose.codespace-x.yml codespace

            - name: Send notification
              uses: sarisia/actions-status-discord@v1
              if: always()
              with:
                  webhook: ${{ secrets.DISCORD_WEBHOOK_CICD }}
                  username: GitHub Actions
